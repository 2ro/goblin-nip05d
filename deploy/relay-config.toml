# nostr-rs-relay configuration for the relay bundled alongside the name
# authority. This is the relay you advertise in GOBLIN_RELAYS.
#
# The wallet only needs a small set of event kinds: profile metadata, contact/
# relay lists, deletions, gift wraps (private payments), and relay-preference
# lists. Restricting kinds keeps the relay lean and resistant to spam.

[info]
name = "goblin relay"
description = "Relay for the goblin name authority."

[database]
# Path inside the scsibug/nostr-rs-relay container.
data_directory = "/usr/src/app/db"

[network]
# The proxy (Caddy) terminates TLS and forwards plain ws to this address.
address = "0.0.0.0"
port = 8080

[limits]
# Reject oversized events. 64 KiB comfortably fits metadata and gift wraps.
max_event_bytes = 65536

# Only these event kinds are accepted; everything else is discarded:
#   0     profile metadata
#   3     contact list
#   5     event deletion
#   1059  gift wrap (NIP-59, private payments)
#   10002 relay list metadata (NIP-65)
#   10050 preferred DM relays (NIP-17)
event_kind_allowlist = [0, 3, 5, 1059, 10002, 10050]

[options]
# Reject events with timestamps too far from the present.
reject_future_seconds = 1800

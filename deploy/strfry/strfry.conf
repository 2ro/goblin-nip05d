##
## strfry configuration for the relay bundled alongside the name authority.
## This is the relay you advertise in GOBLIN_RELAYS.
##
## strfry (https://github.com/hoytech/strfry) is a high-performance C++/LMDB
## relay. The wallet only needs a small set of event kinds: profile metadata,
## contact/relay lists, deletions, gift wraps (private payments) and DM-relay
## lists. A write-policy plugin restricts stored kinds to exactly those (see
## strfry-writepolicy.py) — everything else is rejected at ingest.
##

# Directory that contains the strfry LMDB database. Mounted as a volume so the
# data survives container restarts.
db = "/strfry-db/"

dbParams {
    maxreaders = 256
    # 10 TB virtual mmap; does NOT preallocate disk.
    mapsize = 10995116277760
    noReadAhead = false
}

events {
    # Reject oversized events. 64 KiB comfortably fits metadata and gift wraps.
    maxEventSize = 65536

    # Clock-skew tolerance for future-dated events. NIP-59 gift wraps tweak
    # created_at *backwards* (up to ~2 days), so they're unaffected by the
    # future bound; keep it tight (the strfry default) to limit future-dated
    # spam and replaceable-event games.
    rejectEventsNewerThanSeconds = 900

    # Accept back-dated events for a long window — gift-wrap timestamp tweaking
    # stays far inside this (~3 years).
    rejectEventsOlderThanSeconds = 94608000

    rejectEphemeralEventsOlderThanSeconds = 60
    ephemeralEventsLifetimeSeconds = 300
    maxNumTags = 2000
    maxTagValSize = 1024
}

relay {
    # Listen on all interfaces inside the container; the reverse proxy in front
    # is the only thing that reaches it.
    bind = "0.0.0.0"
    port = 7777
    nofiles = 524288

    # The reverse proxy (Caddy/nginx) sets this from the real client address.
    # Used for logging and any IP-based policy.
    realIpHeader = "x-real-ip"

    auth {
        # NIP-42 authentication OFF: the wallet publishes and reads gift wraps
        # without authenticating, exactly as on the previous relay. (Gating
        # kind-1059 reads to the recipient is a future opt-in and needs a
        # NIP-42-capable client.)
        enabled = false
        serviceUrl = ""
    }

    info {
        # NIP-11 relay information document, served on GET / with
        # `Accept: application/nostr+json`. `nips` empty = advertise strfry's
        # built-in supported NIPs; `software`/`version` are filled automatically.
        name = "Goblin Relay"
        description = "Goblin name-authority relay for NIP-17 gift-wrapped payments."
        nips = ""
    }

    maxWebsocketPayloadSize = 131072
    maxReqFilterSize = 200
    autoPingSeconds = 55
    enableTcpKeepalive = true
    queryTimesliceBudgetMicroseconds = 10000
    # Plenty for a wallet's gift-wrap history scan; bounds a single REQ's work.
    maxFilterLimit = 500
    # The wallet keeps one live subscription plus a few one-shot fetches. Cap
    # low so an unauthenticated client can't open a flood of scanning subs.
    maxSubsPerConnection = 20
    maxPendingOutboundBytes = 33554432

    writePolicy {
        # Restrict stored kinds to the wallet's set (see strfry-writepolicy.py):
        #   0 metadata, 3 contacts, 5 deletion, 1059 gift wrap (NIP-59),
        #   10002 relay list (NIP-65), 10050 preferred DM relays (NIP-17).
        plugin = "/usr/local/bin/strfry-writepolicy.py"
        timeoutSeconds = 10
    }

    compression {
        enabled = true
        slidingWindow = true
    }

    logging {
        dumpInAll = false
        dumpInEvents = false
        dumpInReqs = false
        dbScanPerf = false
        invalidEvents = true
    }

    numThreads {
        ingester = 3
        reqWorker = 3
        reqMonitor = 3
        negentropy = 2
    }

    negentropy {
        # Set reconciliation (NIP-77) so community mirrors can sync cheaply.
        enabled = true
        maxSyncEvents = 1000000
    }

    filterValidation {
        # Leave OFF: the wallet legitimately queries several kinds in one
        # filter, which strict validation (maxKindsPerFilter) would reject.
        # Stored-kind restriction is handled by the write policy above.
        enabled = false
    }
}
